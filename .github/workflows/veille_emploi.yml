name: Veille Emploi — Analyse Sensorielle Occitanie

on:
  schedule:
    # Tous les jours à 7h00 (5h UTC, heure de Paris en été)
    - cron: "0 5 * * *"
  workflow_dispatch: # déclenchement manuel possible

permissions:
  issues: write

jobs:
  recherche:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install requests beautifulsoup4 lxml

      - name: Lancer la recherche et créer l'issue
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FT_CLIENT_ID:      ${{ secrets.FT_CLIENT_ID }}
          FT_CLIENT_SECRET:  ${{ secrets.FT_CLIENT_SECRET }}
        run: python recherche_emploi.py
